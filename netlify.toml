[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[functions."enrich-lead"]
  timeout = 8

[functions."chat"]
  timeout = 26

[functions."generate-outreach"]
  timeout = 26

[functions."send-linkedin-invite"]
  timeout = 26

[functions."qualify-leads"]
  timeout = 26

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# env var added: SUPABASE_SERVICE_KEY
